apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openstack-vm-manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openstack-vm-manager.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
