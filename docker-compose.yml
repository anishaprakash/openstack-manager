version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    image: openstack-vm-manager:latest
    container_name: openstack-vm-manager
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override specific values here if needed, e.g.:
      # DEBUG: "true"
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Optional: Prometheus + Grafana for observability ──────────────────────
  # Uncomment when you add the /metrics endpoint (see roadmap in README).
  #
  # prometheus:
  #   image: prom/prometheus:latest
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - prometheus
